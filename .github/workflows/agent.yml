name: Run AI Investment Agent

on:
  schedule:
    - cron: '0 14 * * *'  # runs daily at 14:00 UTC (~4am Hawaii)
  workflow_dispatch:       # allows manual run

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      - name: Commit and push updates
        run: |
          git config --global user.name "ai-agent"
          git config --global user.email "agent@github.com"
          git add history.csv portfolio_value.csv
          git commit -m "auto update data" || echo "No changes to commit"
          git push

